<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ==================== SIDEBAR ==================== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>💰 FinControl</h1>
            <button class="menu-close" onclick="closeSidebar()">✕</button>
        </div>

        <nav class="sidebar-menu">
            <a href="#" class="menu-item active" onclick="showPage('dashboard')">
                <span class="menu-icon">📊</span>
                <span class="menu-text">Dashboard</span>
            </a>
            <a href="#" class="menu-item" onclick="showPage('transactions')">
                <span class="menu-icon">💳</span>
                <span class="menu-text">Transações</span>
            </a>
        </nav>
    </aside>

    <div class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h2 id="page-title">Dashboard</h2>
        </div>

        <!-- ==================== DASHBOARD PAGE ==================== -->
        <div class="page active" id="dashboard">
            <!-- Cards de Resumo -->
            <div class="cards-grid">
                <div class="card">
                    <div class="card-header">
                        <span>💰 Receitas</span>
                    </div>
                    <div class="card-value income" id="total-income">R$ 0,00</div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>💸 Despesas</span>
                    </div>
                    <div class="card-value expense" id="total-expenses">R$ 0,00</div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>💵 Saldo</span>
                    </div>
                    <div class="card-value" id="balance">R$ 0,00</div>
                </div>
            </div>

            <!-- Botão Nova Transação -->
            <button class="btn btn-primary btn-large" onclick="openModal('transaction-modal')">
                ➕ Nova Transação
            </button>

            <!-- Transações Recentes -->
            <div class="card">
                <div class="card-header">
                    <h3>📋 Transações Recentes</h3>
                </div>
                <div id="recent-transactions">
                    <div class="empty-state">
                        <span class="empty-icon">📝</span>
                        <p>Nenhuma transação ainda</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== TRANSACTIONS PAGE ==================== -->
        <div class="page" id="transactions">
            <button class="btn btn-primary btn-large" onclick="openModal('transaction-modal')">
                ➕ Nova Transação
            </button>

            <!-- Filtros -->
            <div class="card">
                <div class="filters-bar">
                    <input type="text" id="search" class="input-field" placeholder="🔍 Buscar..." onkeyup="applyFilters()">
                    
                    <select id="filter-type" class="input-field" onchange="applyFilters()">
                        <option value="all">Todos os tipos</option>
                        <option value="income">Receitas</option>
                        <option value="expense">Despesas</option>
                    </select>
                    
                    <select id="filter-category" class="input-field" onchange="applyFilters()">
                        <option value="all">Todas categorias</option>
                        <option value="Salário">Salário</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Investimentos">Investimentos</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Moradia">Moradia</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Educação">Educação</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
            </div>

            <!-- Lista de Transações -->
            <div class="card">
                <div id="transactions-list">
                    <div class="empty-state">
                        <span class="empty-icon">🔍</span>
                        <p>Nenhuma transação encontrada</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ==================== MODAL TRANSAÇÃO ==================== -->
    <div class="modal-overlay" id="transaction-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Nova Transação</h2>
                <button class="modal-close" onclick="closeModal('transaction-modal')">✕</button>
            </div>
            
            <form id="transaction-form" onsubmit="saveTransaction(event)">
                <input type="hidden" id="transaction-id">
                <input type="hidden" id="transaction-type" value="expense">
                
                <!-- Toggle Tipo -->
                <div class="type-toggle">
                    <button type="button" class="type-btn expense active" onclick="setTransactionType('expense')">
                        💸 Despesa
                    </button>
                    <button type="button" class="type-btn income" onclick="setTransactionType('income')">
                        💰 Receita
                    </button>
                </div>

                <div class="form-group">
                    <label for="description">Descrição *</label>
                    <input type="text" id="description" class="input-field" placeholder="Ex: Compra no supermercado" required>
                </div>

                <div class="form-group">
                    <label for="amount">Valor *</label>
                    <input type="number" id="amount" class="input-field" placeholder="0,00" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="category">Categoria *</label>
                    <select id="category" class="input-field" required>
                        <option value="">Selecione...</option>
                        <optgroup label="Receitas">
                            <option value="Salário">Salário</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Investimentos">Investimentos</option>
                            <option value="Outros">Outros</option>
                        </optgroup>
                        <optgroup label="Despesas">
                            <option value="Alimentação">Alimentação</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Moradia">Moradia</option>
                            <option value="Saúde">Saúde</option>
                            <option value="Educação">Educação</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Outros">Outros</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Data *</label>
                    <input type="date" id="date" class="input-field" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('transaction-modal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">💾 Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script src="app.js"></script>
</body>
</html>
